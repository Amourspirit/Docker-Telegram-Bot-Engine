actions:
  cf_arcane_status:
    stop_on_failure: true
    aliases:
      - cf_status_arcane
    allowed_roles:
      - admin
      - operator
    tags:
      - cloudflare
      - arcane
      - route
      - status
    handlers:
      - id: host.server.arcane_status
        target: host
        operation: server.cf_action
        stage: 0
        timeout_seconds: 8
        params:
          domain_var: $CF_ARCANE_DOMAIN_NAME
          action: status
    unregister: []
  cf_arcane_enable:
    stop_on_failure: true
