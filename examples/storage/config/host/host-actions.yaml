operations:
  server.cf_action:
    command:
    - /bin/bash
    - -lc
    - source $HOST_PROJECT_ROOT/storage/scripts/cf.sh && cf_remote_cmd "{{domain_var}}"
      "{{action}}"
    timeout_seconds: 15
    allow_user_args: false
    allowed_placeholders:
    - domain_var
    - action
  server.cf_domain:
    command:
    - /bin/bash
    - -lc
    - source $HOST_PROJECT_ROOT/storage/scripts/cf.sh && printf '%s\n' "{{domain_var}}"
    timeout_seconds: 5
    allow_user_args: false
    allowed_placeholders:
    - domain_var
  server.cf_url:
    command:
    - /bin/bash
    - -lc
    - source $HOST_PROJECT_ROOT/storage/scripts/cf.sh && printf '%s\n' "https://{{domain_var}}"
    timeout_seconds: 5
    allow_user_args: false
    allowed_placeholders:
    - domain_var
  server.uptime:
    command:
    - /usr/bin/uptime
    timeout_seconds: 5
    allow_user_args: false
  server.generic_url:
    command:
    - /bin/bash
    - -lc
    - printf '%s\n' "https://{{domain_var}}"
    timeout_seconds: 5
    allow_user_args: false
    allowed_placeholders:
    - domain_var
  server.lms_ps:
    command:
    - $HOME/.lmstudio/bin/lms
    - '{{subcmd}}'
    timeout_seconds: 5
    allow_user_args: true
    allowed_placeholders:
    - subcmd
    allowed_optional_params:
    - --json
    reply_format:
    - default: markdown
      json:
      - single:
        - --json
  server.lms_ls:
    command:
    - $HOME/.lmstudio/bin/lms
    - ls
    timeout_seconds: 5
    allow_user_args: true
    allowed_optional_params:
    - --llm
    - --embedding
    - --variants
    - --json
    reply_format:
    - default: markdown
      json:
      - single:
        - --json
      - ands:
        - and:
          - --embedding
          - --json
        - and:
          - --llm
          - --json
        - and:
          - --variants
          - --json
  server.logs_action:
    command:
    - tail
    - -n
    - '{{lines}}'
    - '{{log_path}}'
    timeout_seconds: 5
    allow_user_args: false
    allowed_placeholders:
    - lines
    - log_path
  server.stack_action:
    command:
    - /bin/bash
    - -lc
    - source "$HOST_PROJECT_ROOT/storage/scripts/spiral_stack.sh" && stack_cmd "{{action}}"
    timeout_seconds: 15
    allow_user_args: false
    allowed_placeholders:
    - action
