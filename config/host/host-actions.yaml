operations:
  server.uptime:
    command:
    - /usr/bin/uptime
    timeout_seconds: 5
    allow_user_args: false
  server.logs_action:
    command:
    - tail
    - -n
    - '{{lines}}'
    - '{{log_path}}'
    timeout_seconds: 5
    allow_user_args: false
    allowed_placeholders:
    - lines
    - log_path
