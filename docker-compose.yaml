name: ${COMPOSE_PROJECT_NAME}

services:
  telegram-c2-bot:
    build:
      context: .
      dockerfile: ./src/bot/Dockerfile
    container_name: telegram-c2-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:?Set TELEGRAM_BOT_TOKEN in .env}
      - BOT_HOST_ACTION_ENDPOINT=${BOT_HOST_ACTION_ENDPOINT:-host.docker.internal:8787}
      - BOT_HOST_ACTION_SOCKET=${BOT_HOST_ACTION_SOCKET:-/var/run/telegram-bot/host-actions.sock}
    volumes:
      # macOS Docker Desktop Socket Mapping
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      - ${CONFIG_PATH?Set CONFIG_PATH in .env}/bot:/app/config:ro